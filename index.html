<!DOCTYPE html>
<html>
  

<head>

  <meta charset="UTF-8">

  <title>Sistema de Cadastro</title>



   <link rel="stylesheet" href="style.css">

  

</head>

<body>

  <div class="container">

    <h2>Sistema de Cadastro</h2>
<input id="pesquisa" placeholder="Pesquisar cliente">
    <input id="nome" placeholder="Digite seu nome">
    <input id="data" type="date">
    <input id="servico" placeholder="Digite o serviço">
    <input id="hora" type="time">
    <input id="valor" type="number" placeholder="Valor do serviço">

    <button onclick="adicionar()">Cadastrar</button>
    <h3 id="total">Total: R$ 0</h3>

    <ul id="lista"></ul>

  </div>

  <script src="script.js"></script>
  <div id="modal" class="modal">

<div class="modal-content">

<h3>Editar Agendamento</h3>

<input type="text" id="editarNome">

<input type="date" id="editarData">

<input type="time" id="editarHora">

<input type="text" id="editarServico">

<input type="number" id="editarValor">

<br><br>

<button onclick="salvarEdicao()">
Salvar
</button>

<button onclick="fecharModal()">
Cancelar
</button>

</div>

</div>
</body>

</html>
